<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %} | SME Fund Finder 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}?v=1">
    <meta name="google-site-verification" content="y3pc6mg6t8XNOIyMvQllhwOkV-BIpjvm1yJasDqs2mY"/>
    {% block extra_head %}{% endblock %}
    <style>
        /* --- CUSTOM CSS TO MATCH IMAGE EXACTLY --- */
        :root {
            --primary-navy: #0d3b66; /* Exact Navy Blue from Image */
            --accent-gold: #f4d35e;  /* Exact Gold from Image */
            --text-dark: #333333;
            --light-bg: #f8f9fa;     /* Light Grey Background from Image */
        }

        body {
            background-color: var(--light-bg);
            font-family: 'Inter', sans-serif;
            color: var(--text-dark);
            -webkit-font-smoothing: antialiased;
        }

        /* Nav Header: Matching the Dark Blue in the Image */
        .navbar-custom {
            background-color: var(--primary-navy);
            padding: 15px 0;
            border-bottom: 3px solid var(--accent-gold); /* Gold accent line */
        }

        .navbar-brand {
            font-weight: 700;
            color: white !important;
            font-size: 1.5rem;
        }

        /* Standard Buttons: Using Primary Navy */
        .btn-navy {
            background-color: var(--primary-navy);
            color: white;
            border: none;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-navy:hover {
            background-color: #082a4a;
            color: white;
        }

        /* The 'Check Eligibility' Button: Uses the Gold Accent */
        .btn-gold {
            background-color: var(--accent-gold);
            color: var(--primary-navy);
            border: none;
            font-weight: 700;
            width: 100%;
            padding: 12px;
        }
        .btn-gold:hover {
            background-color: #e6c54a;
        }

        /* Footer Styling */
        footer {
            background-color: white;
            border-top: 1px solid #dee2e6;
            margin-top: 50px;
            padding: 30px 0;
        }
        footer a {
            text-decoration: none;
            color: #6c757d;
        }

                /* Content Page Styling */
        .content-section {
            line-height: 1.8;
            color: #333;
        }

        .content-section h1, .content-section h4, .content-section h5 {
            color: var(--primary-navy);
            margin-top: 1.5rem;
        }

        .content-section p {
            margin-bottom: 1.2rem;
        }

        /* Specific styling for lists in About/Privacy */
        .content-section ul li {
            margin-bottom: 0.8rem;
        }

        /* Ensuring the container stays centered and clean on mobile */
        @media (max-width: 768px) {
            .content-section {
                padding: 0 15px;
            }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow-sm py-3" style="background-color: var(--primary-navy);">
    <div class="container">
        <!-- Brand -->
        <a class="navbar-brand fw-bold" href="/">
            <i class="bi bi-bank2 me-2"></i>SME Fund Finder
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <!-- Integrated Search Bar -->
            <form action="/" method="GET" class="d-flex mx-auto mt-3 mt-lg-0 w-100" style="max-width: 400px;">
                <div class="input-group input-group-sm">
                    <input type="text" name="q" class="form-control" placeholder="Search by State..."
                           aria-label="Search">
                    <button class="btn btn-gold" type="submit"><i class="bi bi-search"></i></button>
                </div>
            </form>

            <ul class="navbar-nav ms-auto mt-2 mt-lg-0">
                <li class="nav-item"><a class="nav-link text-white" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/about">About Us</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/contact">Contact US</a></li>
                <li class="nav-item"><a class="nav-link text-white" href="/privacy-policy">Privacy</a></li>
            </ul>
        </div>
    </div>
</nav>

{% block content %}{% endblock %}

<footer>
    <div class="container text-center text-muted">
        <p class="mb-1">&copy; 2026 SME Fund Finder. All Rights Reserved.</p>
        <small>
            <a href="/privacy" class="me-3">Privacy Policy</a>
            <a href="/terms">Terms of Service</a>
        </small>
    </div>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
